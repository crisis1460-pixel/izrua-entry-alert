# 보안 3차 방어선: 모든 push/PR 에서 비밀정보 스캔을 강제한다.
# 로컬 훅을 깜빡해도 GitHub 이 서버 측에서 한 번 더 막는다 — 걸리면 이 잡이 실패(빨간 X).
name: secret-scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 전체 히스토리도 검사 대상에 포함
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 커스텀 비밀정보 스캐너
        run: python scripts/check_secrets.py
      - name: gitleaks (2차 교차검증, 공개레포 무료)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
