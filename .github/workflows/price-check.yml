# 가격체크 잡 — cron-job.org 이 5~10분마다 workflow_dispatch 로 트리거.
# 알림 지연을 줄이려 가볍게 유지 (실행 ~1분). 터치 소급 판정은 1분봉 저가로 하므로
# 트리거가 밀려도 놓치지 않는다.
name: price-check

on:
  workflow_dispatch:

permissions:
  contents: write  # data/ 상태 커밋 백
  actions: read    # 구버전 아티팩트 마이그레이션용

# 2026-07-24: collect 와 그룹 분리 (공유 시 pending collect 가 반복 취소되는
# 수집 기아 문제). 가격체크끼리는 이 그룹으로 직렬화된다.
concurrency:
  group: price-check-runner
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: 구버전 아티팩트 마이그레이션 (data/ 에 DB 없을 때 1회만)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if [ -f data/levels.db ]; then
            echo "data/levels.db 존재 - 마이그레이션 불필요"
            exit 0
          fi
          ART_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=50" \
            --jq '[.artifacts[] | select(.name=="bot-state" and .expired==false)] | sort_by(.created_at) | last | .id' || true)
          if [ -n "$ART_ID" ] && [ "$ART_ID" != "null" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$ART_ID/zip" > state.zip
            mkdir -p data && unzip -o state.zip -d data && rm state.zip
            echo "아티팩트 → data/ 마이그레이션 완료 (artifact $ART_ID)"
          else
            echo "이전 상태 없음 - 수집이 먼저 1회 돌아야 함 (레벨 0개로 정상 종료)"
          fi

      - name: 가격체크 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/run_price_check.py

      - name: 상태 커밋 백 (변경 시에만, 경합 재시도)
        run: |
          set -e
          git config user.name "izrua-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "상태 변경 없음"; exit 0
          fi
          git commit -m "data: check $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          for i in 1 2 3; do
            git pull --rebase -X ours origin main || { git rebase --abort; sleep 3; continue; }
            git push origin main && exit 0
            sleep 3
          done
          echo "::warning::상태 커밋 push 3회 실패 - 다음 회차에 재감지됨"
