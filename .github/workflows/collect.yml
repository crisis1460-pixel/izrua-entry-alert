# 수집 잡 — cron-job.org 이 4시간마다 workflow_dispatch 로 트리거 (워쳐와 동일 패턴).
# DB/캐시는 'bot-state' 아티팩트로 이어달리기: 이전 최신 아티팩트 복원 → 실행 → 재업로드.
name: collect

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read   # 이전 아티팩트 조회/다운로드

# 가격체크 잡과 같은 그룹 — DB 아티팩트 동시 쓰기 경합(마지막 승자만 남는 유실) 방지.
concurrency:
  group: bot-state-writer
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: 이전 상태(bot-state) 복원 (첫 실행이면 빈 상태로 시작)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          ART_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=50" \
            --jq '[.artifacts[] | select(.name=="bot-state" and .expired==false)] | sort_by(.created_at) | last | .id' || true)
          if [ -n "$ART_ID" ] && [ "$ART_ID" != "null" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$ART_ID/zip" > state.zip
            mkdir -p cache && unzip -o state.zip -d cache && rm state.zip
            echo "상태 복원 완료 (artifact $ART_ID)"
          else
            echo "이전 상태 없음 - 신규 시작"
          fi

      - name: 수집 실행
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          WATCHER_GITHUB_TOKEN: ${{ secrets.WATCHER_GITHUB_TOKEN }}
          TV_COOKIE: ${{ secrets.TV_COOKIE }}
        run: python scripts/run_collect.py

      - name: 상태 업로드
        uses: actions/upload-artifact@v4
        with:
          name: bot-state
          path: cache/
          retention-days: 3
          overwrite: false
