# 수집 잡 — cron-job.org 이 4시간마다 workflow_dispatch 로 트리거 (워쳐와 동일 패턴).
# DB/캐시는 'bot-state' 아티팩트로 이어달리기: 이전 최신 아티팩트 복원 → 실행 → 재업로드.
name: collect

on:
  workflow_dispatch:

permissions:
  contents: write  # data/ 상태 커밋 백 (2026-07-23 적중DB 영속화 결정)
  actions: read    # 구버전 아티팩트에서 1회성 마이그레이션용

# 가격체크 잡과 같은 그룹 — DB 아티팩트 동시 쓰기 경합(마지막 승자만 남는 유실) 방지.
concurrency:
  group: bot-state-writer
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: 구버전 아티팩트 마이그레이션 (data/ 에 DB 없을 때 1회만)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if [ -f data/levels.db ]; then
            echo "data/levels.db 존재 - 마이그레이션 불필요"
            exit 0
          fi
          ART_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=50" \
            --jq '[.artifacts[] | select(.name=="bot-state" and .expired==false)] | sort_by(.created_at) | last | .id' || true)
          if [ -n "$ART_ID" ] && [ "$ART_ID" != "null" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$ART_ID/zip" > state.zip
            mkdir -p data && unzip -o state.zip -d data && rm state.zip
            echo "아티팩트 → data/ 마이그레이션 완료 (artifact $ART_ID)"
          else
            echo "이전 상태 없음 - 신규 시작"
          fi

      - name: 수집 실행
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          WATCHER_GITHUB_TOKEN: ${{ secrets.WATCHER_GITHUB_TOKEN }}
          TV_COOKIE: ${{ secrets.TV_COOKIE }}
        run: python scripts/run_collect.py

      - name: 상태 커밋 백 (변경 시에만 - 커밋 히스토리가 스냅샷 백업)
        run: |
          set -e
          git config user.name "izrua-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "상태 변경 없음"
          else
            git commit -m "data: collect $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git pull --rebase origin main || true
            git push origin main
          fi
